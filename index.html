<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay Điện Tử - Xã Sơn Đồng</title>
    <link rel="icon" href="MediaWeb/Emblem_of_Hanoi.svg" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

       body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;

            /* CODE ẢNH NỀN CHỈ ĐƯỢC NẰM Ở ĐÂY */
            background-image: url('MediaWeb/bg1.jpg'); /* Thay tên ảnh của bạn */
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #eef2f5; 
        }

        /* Container mô phỏng cuốn sách */
        .book-cover {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 2 / 3;
            background: linear-gradient(160deg, #2b84c8 0%, #155b9e 40%, #063973 100%);
            border-radius: 8px 25px 25px 8px;
            box-shadow: 15px 20px 40px rgba(0, 0, 0, 0.4), 
                        inset -5px 0 15px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Gáy sách */
        .book-spine {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 18px;
            background: linear-gradient(90deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
            border-right: 1px solid rgba(0,0,0,0.2);
        }

        /* Các icon trang trí nền */
        .decor {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-size: 28px;
            z-index: 1;
        }
        .d-top-left { top: 25px; left: 35px; font-size: 24px; }
        .d-top-right { top: 25px; right: 25px; font-size: 24px; }
        .d-mid-left { top: 45%; left: -5px; font-size: 40px; }
        .d-mid-right { top: 50%; right: 15px; font-size: 35px; }
        .d-bot-left { bottom: 25px; left: 35px; }
        .d-bot-right {
            bottom: 25px;
            right: 25px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.3;
            text-align: right;
            color: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        /* CSS cho phần Logo Ảnh */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            z-index: 2;
        }

       .custom-logo {
            width: 90px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(-1.5px -1.5px 1px rgba(255, 255, 255, 0.5)) 
                    drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.6));
            transition: transform 0.3s ease;
        }

        .custom-logo:hover {
            transform: translateY(-2px) scale(1.05);
            filter: drop-shadow(-2px -2px 2px rgba(255, 255, 255, 0.6)) 
                    drop-shadow(3px 3px 5px rgba(0, 0, 0, 0.7));
        }

        .gold-text {
            text-align: center;
            text-transform: uppercase;
            
            /* Đặt góc nghiêng 110deg và thêm các điểm sáng gắt để khi chạy ngang sẽ tạo hiệu ứng chớp lóa */
            background: linear-gradient(110deg, 
                #f4c330 0%, 
                #ffffe6 20%,   /* Vệt sáng lướt qua */
                #f4c330 40%, 
                #7a4d00 48%,   /* Rãnh tối kim loại */
                #ffffff 50%,   /* Vệt sáng gắt */
                #ffdf4a 52%, 
                #e4a816 100%
            );
            
            /* THÊM LẠI 2 DÒNG NÀY ĐỂ KÍCH HOẠT CHUYỂN ĐỘNG */
            background-size: 200% auto;
            animation: shine 3s linear infinite; 
            
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Giữ nguyên lớp bóng đổ 3D */
            filter: drop-shadow(1px 1px 0px #a67c00) 
                    drop-shadow(2px 2px 0px #806000) 
                    drop-shadow(4px 6px 5px rgba(0, 0, 0, 0.6));
            z-index: 2;
        }
        /* Khai báo chuyển động lấp lánh */
        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .title-sub {
            font-family: 'Oswald', sans-serif; /* Thêm font Oswald */
            font-size: 30px; /* Tăng cỡ chữ vì font dáng hẹp */
            font-weight: 700;
            line-height: 1.4;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
            margin-top: -10px;
            margin-bottom: 35px;
        }

       .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: 55px;
            font-weight: 700;
            line-height: 1.6;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
            margin-top: -10px;
            margin-bottom: 5px;
            position: relative; /* THÊM DÒNG NÀY ĐỂ NEO CÁC ĐIỂM SÁNG */
        }

        

        /* Khung kính chứa nút bấm (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            width: 220px;
            height: 160px;
        }

        /* Nút bấm mở Modal */
       .btn-open {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #b13b00;
            
            font-size: 14px; /* Thu nhỏ cỡ chữ xuống (cũ là 16px) */
            white-space: nowrap; /* Ép chữ luôn nằm trên 1 dòng */
            padding: 12px 20px; /* Thu gọn lề trên/dưới và trái/phải một chút */
            
            font-weight: 900;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .btn-open:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            color: #8a2e00;
        }

        /* Dòng chữ hướng dẫn */
        .instruction {
            margin-top: 25px;
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: 26px;
            text-align: center;
            z-index: 2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>
    <div class="book-cover">
        <div class="book-spine"></div>

        <i class="fas fa-mobile-screen decor d-top-left"></i>
        <i class="fas fa-wifi decor d-top-right"></i>
        <i class="fas fa-microchip decor d-mid-left"></i>
        <i class="fas fa-cloud-arrow-up decor d-mid-right"></i>
        <i class="fas fa-gear decor d-bot-left"></i>
        <div class="decor d-bot-right">
            010101<br>100110<br>010110
        </div>

        <div class="logo-container">
            <img src="MediaWeb/Emblem_of_Hanoi.svg" alt="Logo Hà Nội" class="custom-logo">
        </div>

        <div class="gold-text title-main">SỔ TAY ĐIỆN TỬ</div>
        <div class="gold-text title-sub">CHUYỂN ĐỔI SỐ XÃ SƠN ĐỒNG</div>

        <div class="glass-panel">
           <a href="https://heyzine.com/flip-book/3004134edc.html"
   class="btn-open"
   id="openBook">
   <i class="fas fa-book-open"></i> Mở sổ tay
</a>
        </div>

        <div class="instruction">
            Mời bạn bấm nút để xem sổ tay
        </div>
    </div>
    <script src="https://cdnc.heyzine.com/release/addons.5.min.js"></script>

<script>
document.getElementById("openBook").addEventListener("click", function(e) {
  e.preventDefault();

  if (window.heyzinea) {
    heyzinea.open(this.href); // ép mở modal
  } else {
    window.open(this.href, "_blank"); // fallback
  }
});
</script>
</body>
</html>
