<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay Điện Tử - Xã Sơn Đồng</title>
    <link rel="icon" href="MediaWeb/Emblem_of_Hanoi.svg" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;

            background-image: url('MediaWeb/bg1.jpg');
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #eef2f5; 
        }

        /* Container mô phỏng cuốn sách */
        .book-cover {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 2 / 3;
            background: linear-gradient(160deg, #2b84c8 0%, #155b9e 40%, #063973 100%);
            border-radius: 8px 25px 25px 8px;
            box-shadow: 15px 20px 40px rgba(0, 0, 0, 0.4), 
                        inset -5px 0 15px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Gáy sách */
        .book-spine {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 18px;
            background: linear-gradient(90deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
            border-right: 1px solid rgba(0,0,0,0.2);
        }

        /* Các icon trang trí nền */
        .decor {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-size: 28px;
            z-index: 1;
        }
        .d-top-left { top: 25px; left: 35px; font-size: 24px; }
        .d-top-right { top: 25px; right: 25px; font-size: 24px; }
        .d-mid-left { top: 45%; left: -5px; font-size: 40px; }
        .d-mid-right { top: 50%; right: 15px; font-size: 35px; }
        .d-bot-left { bottom: 25px; left: 35px; }
        .d-bot-right {
            bottom: 25px;
            right: 25px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.3;
            text-align: right;
            color: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        /* CSS cho phần Logo Ảnh */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            z-index: 2;
        }

        .custom-logo {
            width: 90px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(-1.5px -1.5px 1px rgba(255, 255, 255, 0.5)) 
                    drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.6));
            transition: transform 0.3s ease;
        }

        .custom-logo:hover {
            transform: translateY(-2px) scale(1.05);
            filter: drop-shadow(-2px -2px 2px rgba(255, 255, 255, 0.6)) 
                    drop-shadow(3px 3px 5px rgba(0, 0, 0, 0.7));
        }

        .gold-text {
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(110deg, 
                #f4c330 0%, 
                #ffffe6 20%,
                #f4c330 40%, 
                #7a4d00 48%,
                #ffffff 50%,
                #ffdf4a 52%, 
                #e4a816 100%
            );
            background-size: 200% auto;
            animation: shine 3s linear infinite; 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 0px #a67c00) 
                    drop-shadow(2px 2px 0px #806000) 
                    drop-shadow(4px 6px 5px rgba(0, 0, 0, 0.6));
            z-index: 2;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .title-sub {
            font-family: 'Oswald', sans-serif;
            font-size: 30px;
            font-weight: 700;
            line-height: 1.4;
            padding: 10px 15px;
            margin-top: -10px;
            margin-bottom: 35px;
        }

        .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: 55px;
            font-weight: 700;
            line-height: 1.6;
            padding: 10px 15px;
            margin-top: -10px;
            margin-bottom: 5px;
            position: relative;
        }

        /* Khung kính chứa nút bấm (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            width: 220px;
            height: 160px;
        }

        /* Nút bấm mở Modal */
        .btn-open {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #b13b00;
            font-size: 14px;
            white-space: nowrap;
            padding: 12px 20px;
            font-weight: 900;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .btn-open:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            color: #8a2e00;
        }

        /* Dòng chữ hướng dẫn */
        .instruction {
            margin-top: 25px;
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: 26px;
            text-align: center;
            z-index: 2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            position: relative;
            width: 90vw;
            height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .modal-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: background 0.2s ease;
        }
        .modal-close:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="book-cover">
        <div class="book-spine"></div>

        <i class="fas fa-mobile-screen decor d-top-left"></i>
        <i class="fas fa-wifi decor d-top-right"></i>
        <i class="fas fa-microchip decor d-mid-left"></i>
        <i class="fas fa-cloud-arrow-up decor d-mid-right"></i>
        <i class="fas fa-gear decor d-bot-left"></i>
        <div class="decor d-bot-right">
            010101<br>100110<br>010110
        </div>

        <div class="logo-container">
            <img src="MediaWeb/Emblem_of_Hanoi.svg" alt="Logo Hà Nội" class="custom-logo">
        </div>

        <div class="gold-text title-main">SỔ TAY ĐIỆN TỬ</div>
        <div class="gold-text title-sub">CHUYỂN ĐỔI SỐ XÃ SƠN ĐỒNG</div>

        <div class="glass-panel">
            <a href="https://heyzine.com/flip-book/3004134edc.html"
               class="btn-open"
               id="openBook">
                <i class="fas fa-book-open"></i> Mở sổ tay
            </a>
        </div>

        <div class="instruction">
            Mời bạn bấm nút để xem sổ tay
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-close" id="closeModal">&times;</div>
            <iframe id="bookFrame" src="" allowfullscreen 
    allow="autoplay; encrypted-media; fullscreen"></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const bookFrame = document.getElementById('bookFrame');
        const BOOK_URL = 'https://heyzine.com/flip-book/3004134edc.html';

        document.getElementById('openBook').addEventListener('click', function(e) {
            e.preventDefault();
            bookFrame.src = BOOK_URL;
            modal.classList.add('active');
        });

        document.getElementById('closeModal').addEventListener('click', function() {
            modal.classList.remove('active');
            bookFrame.src = '';
        });

        // Click ra ngoài để đóng modal
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
                bookFrame.src = '';
            }
        });

        // Nhấn ESC để đóng modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                modal.classList.remove('active');
                bookFrame.src = '';
            }
        });
    </script>

</body>
</html>
